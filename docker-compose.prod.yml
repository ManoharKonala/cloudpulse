version: '3.7'
services:
  product-service:
    image: ${DOCKERHUB_USER}/cloudpulse-product-service:latest
    ports:
      - "5001:5001"
    environment:
      - FLASK_ENV=production
    networks:
      - cloudpulse-net
    restart: always

  order-service:
    image: ${DOCKERHUB_USER}/cloudpulse-order-service:latest
    ports:
      - "5002:5002"
    environment:
      - PRODUCT_SERVICE_URL=http://product-service:5001
      - FLASK_ENV=production
    depends_on:
      - product-service
    networks:
      - cloudpulse-net
    restart: always

  frontend:
    image: ${DOCKERHUB_USER}/cloudpulse-frontend:latest
    ports:
      - "80:80"
    depends_on:
      - product-service
      - order-service
    networks:
      - cloudpulse-net
    restart: always

  prometheus:
    image: prom/prometheus:v2.51.0
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks:
      - cloudpulse-net
    restart: always

  grafana:
    image: grafana/grafana:10.4.0
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_SECURITY_ADMIN_USER=admin
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-storage:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - cloudpulse-net
    restart: always

  node-exporter:
    image: prom/node-exporter:v1.7.0
    ports:
      - "9100:9100"
    networks:
      - cloudpulse-net
    restart: always

networks:
  cloudpulse-net:
    driver: bridge

volumes:
  grafana-storage:
