# Local dev hot-reload: source code is mounted as volumes so changes
# take effect without rebuilding the image.
# NOTE: Prometheus → 9091, Grafana → 3001, node-exporter → 9101
# (remapped in docker-compose.yml to avoid conflicts with TodoFlow stack)
version: '3.7'
services:
  product-service:
    volumes:
      - ./services/product-service:/app
    environment:
      - FLASK_ENV=development
      - FLASK_DEBUG=1

  order-service:
    volumes:
      - ./services/order-service:/app
    environment:
      - FLASK_ENV=development
      - FLASK_DEBUG=1

  frontend:
    volumes:
      - ./services/frontend/index.html:/usr/share/nginx/html/index.html:ro
      - ./services/frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
