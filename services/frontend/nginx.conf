server {
    listen 80;
    server_name _;

    # Use Docker's internal DNS; resolve upstreams per-request so Nginx
    # doesn't fail to start if a backend container isn't ready yet.
    resolver 127.0.0.11 valid=10s ipv6=off;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/products {
        set $upstream http://product-service:5001;
        proxy_pass         $upstream/products;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/orders {
        set $upstream http://order-service:5002;
        proxy_pass         $upstream/orders;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/health/products {
        set $upstream http://product-service:5001;
        proxy_pass         $upstream/health;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }

    location /api/health/orders {
        set $upstream http://order-service:5002;
        proxy_pass         $upstream/health;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }
}
